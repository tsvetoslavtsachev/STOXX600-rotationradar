name: Daily Rotation Radar Update

on:
  schedule:
    - cron: "0 22 * * 1-5"  # 22:00 UTC всеки delnik (~17:00 ET след US close)
  workflow_dispatch:        # ръчен trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update
        run: python scripts/daily_update.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily: update ranks history & dashboard data"
            git push
          fi
